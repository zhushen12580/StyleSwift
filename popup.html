<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>个性化界面</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <header>
      <div class="logo-title">
        <img src="./images/icon5.png" alt="Logo" class="logo">
        <h1>个性化界面</h1>
      </div>
      <div class="user-actions">
        <button id="loginBtn" class="icon-button">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
          </svg>
        </button>
      </div>
    </header>
    
    <main>
      <!-- 样式预览区域：用于显示当前选中的样式 -->
      <div id="stylePreview" class="style-preview">
        <img id="previewImage" src="./images/default_style.jpg" alt="样式预览">
      </div>

      
      <!-- 范围选择区域：用于选择样式应用的范围 -->
      <div class="scope-selection">
        <div class="radio-group">
          <div class="radio-item">
            <input type="radio" id="allSites" name="scope" value="all">
            <label for="allSites">所有站点</label>
          </div>
          <div class="radio-item">
            <input type="radio" id="currentSite" name="scope" value="current" checked>
            <label for="currentSite">此站点</label>
          </div>
          <div class="radio-item">
            <input type="radio" id="details" name="scope" value="details">
            <label for="details">细节</label>
          </div>
        </div>
      </div>
      

      <!-- 细节模式：用于选择元素并进行样式美化 -->
      <div id="detailsMode" class="details-mode" style="display: none;">
          <button id="selectElement" class="select-button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7-4.1 4V2z"/>
            </svg>
            <span>定位元素</span>
          </button>
        <div class="style-description">
          <textarea id="elementStyleDescription" placeholder="请描述美化的要求..."></textarea>
        </div>
        <div class="action-buttons">
          <button id="applyElementStyle">一键美化</button>
          <button id="shareElementStyle">分享</button>
        </div>
      </div>
     
      
      <!-- 站点模式：用于选择站点并进行样式美化 -->
      <div id="siteMode">
        <div class="style-selection">
          <select id="styleSelector">
            <option value="default">默认风格</option>
            <option value="modern">现代风</option>
            <option value="retro">复古风</option>
            <option value="eyecare">护眼风</option>
            <option value="cute">可爱风</option>
            <option value="custom">自定义风格</option>
            <option value="custom-css">自定义CSS</option>
          </select>
        </div>
        
        <div id="customStyleInput" class="custom-style-input" style="display: none;">
          <textarea id="customStyleDescription" placeholder="请描述您想要的自定义风格..."></textarea>
        </div>
        
        <div id="customCSSInput" class="custom-style-input" style="display: none;">
          <textarea id="customCSS" placeholder="请输入自定义CSS样式..."></textarea>
        </div>
        
        <div class="action-buttons">
          <button id="applyStyle">一键美化</button>
          <button id="shareStyle">分享</button>
        </div>
      </div>
      

      <!-- 所有站点模式：用于选择所有站点并进行样式美化 -->
      <div id="allSitesMode" style="display: none;">
        <div class="style-selection">
          <select id="widgetSelector">
            <option value="default">隐藏挂件</option>
            <option value="catgirl">二次元猫娘</option>
            <option value="transformer">变形金刚</option>
            <option value="pokemon">宝可梦</option>
            <option value="custom-widget">自定义挂件</option>
            <option value="custom-code">自定义代码</option>
          </select>
        </div>
        
        <!-- 自定义挂件输入区域：用于输入自定义挂件的描述 -->
        <div id="customWidgetInput" class="custom-style-input" style="display: none;">
          <textarea id="customWidgetDescription" placeholder="请描述您想要的自定义挂件..."></textarea>
        </div>
        
        <div id="customCodeInput" class="custom-code-input" style="display: none;">
          <div class="code-tabs">
            <button class="code-tab active" data-tab="html">HTML</button>
            <button class="code-tab" data-tab="css">CSS</button>
            <button class="code-tab" data-tab="js">JavaScript</button>
          </div>
          <div class="code-editors">
            <textarea id="customHTML" class="code-editor active" placeholder="输入HTML代码..."></textarea>
            <textarea id="customCSSAll" class="code-editor" placeholder="输入CSS代码..."></textarea>
            <textarea id="customJS" class="code-editor" placeholder="输入JavaScript代码..."></textarea>
          </div>
        </div>
        
        <div class="action-buttons">
          <button id="applyAllSites">一键美化</button>
          <button id="shareAllSites">分享</button>
        </div>
      </div>
      
      <!-- 加载提示 -->
      <div id="loadingIndicator" style="display: none;">
        <p>正在生成样式，请稍候...</p>
        <div class="spinner"></div>
      </div>
    </main>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
